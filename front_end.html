<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>PassPrint AI - Before & After</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 font-sans p-8">

    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-md border border-slate-200 p-8">
        <h1 class="text-3xl font-bold text-teal-600 mb-2 text-center">PassPrint AI ⚡</h1>
        <p class="text-center text-slate-500 mb-8">ระบบวิเคราะห์และซ่อมแซมไฟล์ก่อนส่งโรงพิมพ์</p>

        <!-- ส่วนอัปโหลด -->
        <div class="mb-8 p-4 bg-slate-50 rounded-xl border border-slate-200 text-center">
            <input type="file" id="fileInput" class="text-sm font-medium text-slate-700" accept="image/*">
        </div>

        <div class="grid grid-cols-2 gap-6">
            <!-- ฝั่งซ้าย: Before -->
            <div class="bg-red-50 p-6 rounded-xl border border-red-200">
                <h3 class="font-bold text-red-700 mb-4 text-xl">🛑 ภาพต้นฉบับ (ปัญหาที่พบ)</h3>
                <!-- เดิม: <div class="h-64 bg-white... -->
                <div
                    class="group h-64 bg-white border border-red-200 rounded-lg flex items-center justify-center overflow-hidden mb-4 p-2 cursor-zoom-in">
                    <!-- เพิ่ม class group-hover... ที่ tag img -->
                    <img id="originalImg"
                        class="hidden max-h-full object-contain transition-transform duration-300 group-hover:scale-[2.0]">
                    <p id="originalText" class="text-slate-400">ยังไม่ได้อัปโหลดภาพ</p>
                </div>
                <div id="issueZone"
                    class="hidden space-y-2 bg-white p-4 rounded-lg border border-red-100 text-sm font-medium text-slate-700">
                    <p id="origSize" class="text-blue-600"></p>
                    <p id="origRes"></p>
                    <p id="origColor"></p>
                </div>
            </div>

            <!-- ฝั่งขวา: After -->
            <div class="bg-teal-50 p-6 rounded-xl border border-teal-200 flex flex-col items-center">
                <h3 class="font-bold text-teal-700 mb-4 text-xl">✨ ภาพหลังซ่อมโดย AI</h3>
                <!-- เดิม: <div class="w-full h-64 bg-white... -->
                <div
                    class="group w-full h-64 bg-white border border-teal-200 rounded-lg flex items-center justify-center overflow-hidden mb-4 p-2 relative cursor-zoom-in">
                    <!-- เพิ่ม class group-hover... ที่ tag img -->
                    <img id="fixedImg"
                        class="hidden max-h-full object-contain transition-transform duration-300 group-hover:scale-[2.0]">
                    <p id="fixedText" class="text-slate-400">รอการซ่อมแซม</p>
                </div>

                <button id="healBtn" disabled
                    class="w-full py-3 rounded-lg bg-slate-300 text-white font-bold transition-all cursor-not-allowed mb-3">
                    กดเพื่อเริ่มซ่อมไฟล์
                </button>

                <div id="fixedStats"
                    class="hidden w-full bg-white p-3 rounded-lg border border-teal-100 text-center text-teal-700 font-bold text-sm mb-3">
                    <!-- โชว์ขนาดใหม่ -->
                </div>
                <!-- เพิ่มกล่องสรุปรายการที่แก้ไขตรงนี้ -->
                <div id="fixesList"
                    class="hidden w-full bg-white p-4 rounded-lg border border-teal-100 text-sm text-slate-700 mb-4 space-y-2">
                    <!-- รายการแก้ไขจะถูกใส่เข้ามาที่นี่อัตโนมัติ -->
                </div>

                <a id="downloadLink" href="#"
                    class="w-full py-3 bg-teal-600 hover:bg-teal-700 text-white rounded-lg hidden font-bold text-center shadow-lg transition-all"
                    download>
                    📥 ดาวน์โหลด PDF (พร้อมพิมพ์)
                </a>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const healBtn = document.getElementById('healBtn');
        let selectedFile = null;

        // สเต็ป 1: เลือกรูป > โชว์รูป > ส่งไปวิเคราะห์
        fileInput.addEventListener('change', async (e) => {
            selectedFile = e.target.files[0];
            if (!selectedFile) return;

            // เอารูปมาโชว์ฝั่งซ้าย (Before)
            document.getElementById('originalImg').src = URL.createObjectURL(selectedFile);
            document.getElementById('originalImg').classList.remove('hidden');
            document.getElementById('originalText').classList.add('hidden');

            const formData = new FormData();
            formData.append("file", selectedFile);

            try {
                healBtn.innerText = "กำลังวิเคราะห์ปัญหา...";
                const res = await fetch("http://127.0.0.1:8000/scan-file", { method: "POST", body: formData });
                const data = await res.json();

                // เอาข้อมูลจริงที่ Python ส่งมา โชว์บนเว็บ
                document.getElementById('issueZone').classList.remove('hidden');
                document.getElementById('origSize').innerText = "📏 " + data.issues.size;
                document.getElementById('origRes').innerText = data.issues.resolution;
                document.getElementById('origColor').innerText = data.issues.color_mode;

                // เปิดปุ่มให้กดซ่อม
                healBtn.disabled = false;
                healBtn.innerText = "✨ กดให้ AI ซ่อมไฟล์ผ่านฉลุย";
                healBtn.className = "w-full py-3 rounded-lg bg-gradient-to-r from-teal-400 to-teal-600 text-white font-bold hover:scale-105 transition-all cursor-pointer mb-3 shadow-md";
            } catch (err) {
                alert("วิเคราะห์ไม่สำเร็จ เช็คว่าเปิดหลังบ้านหรือยังครับ");
            }
        });

        // สเต็ป 2: กดปุ่มซ่อม > ดึงรูปใหม่และ PDF มาโชว์
        healBtn.addEventListener('click', async () => {
            healBtn.innerText = "กำลังขยายภาพ และปรับสี... ⏳";
            healBtn.classList.add('opacity-50', 'pointer-events-none');

            const formData = new FormData();
            formData.append("file", selectedFile);

            try {
                const res = await fetch("http://127.0.0.1:8000/auto-heal", { method: "POST", body: formData });
                const data = await res.json();

                // เอารูปที่แก้แล้วมาโชว์ฝั่งขวา (After)
                document.getElementById('fixedImg').src = data.preview_url;
                document.getElementById('fixedImg').classList.remove('hidden');
                document.getElementById('fixedText').classList.add('hidden');

                // โชว์ขนาดใหม่ที่ใหญ่ขึ้น
                document.getElementById('fixedStats').classList.remove('hidden');
                document.getElementById('fixedStats').innerText = "📈 " + data.fixed_size;

                // --- เพิ่มโค้ด 2 บรรทัดนี้ เพื่อโชว์รายการที่ AI แก้ไข ---
                const fixesList = document.getElementById('fixesList');
                fixesList.innerHTML = data.fixes_applied.map(fix => `<p class="font-medium text-teal-800">${fix}</p>`).join('');
                fixesList.classList.remove('hidden');
                // ---------------------------------------------
                // ปลดล็อคปุ่มดาวน์โหลด
                document.getElementById('downloadLink').href = data.pdf_url;
                document.getElementById('downloadLink').classList.remove('hidden');
                healBtn.classList.add('hidden'); // ซ่อนปุ่มซ่อมไปเลย

            } catch (err) {
                alert("ซ่อมไฟล์ไม่สำเร็จ!");
            }
        });
    </script>
</body>

</html>
